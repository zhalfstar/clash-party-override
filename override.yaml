dns!:
  enable: true
  use-hosts: true
  use-system-hosts: true

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist

  ipv6: false

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - tls://223.5.5.5
    - tls://1.12.12.12

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
