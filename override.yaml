dns!:
  enable: true
  use-hosts: true
  use-system-hosts: true

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  ipv6: false

  default-nameserver:
    - 1.1.1.1
    - 1.0.0.1

  nameserver:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query

  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query

  fake-ip-filter:
    - "*"
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com

  respect-rules: true

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

ipv6: false
